name: Build AzerothCore with acoremods

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ac_branch:
        description: 'AzerothCore branch/tag/commit to build against'
        required: true
        default: 'Latest'
      ac_repo:
        description: 'AzerothCore repository (owner/repo)'
        required: true
        default: 'azerothcore/azerothcore-wotlk'

env:
  AC_REPO: ${{ github.event.inputs.ac_repo || 'azerothcore/azerothcore-wotlk' }}
  AC_BRANCH: ${{ github.event.inputs.ac_branch || 'Latest' }}
  DEPS_URL: 'https://github.com/AzerothCore/deps/releases/download/windows-msbuild-2022/ac-deps-windows-msbuild-2022.7z'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout acoremods
      uses: actions/checkout@v4
      with:
        path: acoremods

    - name: Checkout AzerothCore
      uses: actions/checkout@v4
      with:
        repository: ${{ env.AC_REPO }}
        ref: ${{ env.AC_BRANCH }}
        path: azerothcore

    - name: Download AC Windows dependencies
      shell: pwsh
      run: |
        $depsZip = "$env:RUNNER_TEMP\ac-deps.7z"
        $depsDir = "$env:RUNNER_TEMP\ac-deps"
        Write-Host "Downloading AC deps from $env:DEPS_URL"
        Invoke-WebRequest -Uri $env:DEPS_URL -OutFile $depsZip -ErrorAction Stop
        New-Item -ItemType Directory -Force -Path $depsDir | Out-Null
        & 7z x $depsZip -o"$depsDir" -y | Out-Null
        Write-Host "Deps extracted to $depsDir"
        echo "DEPS_DIR=$depsDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Apply core patches
      shell: bash
      working-directory: azerothcore
      run: |
        PATCH=../acoremods/core-patches/acore-core-hooks.patch
        if git apply --check "$PATCH" 2>/dev/null; then
          git apply "$PATCH"
          echo "Patch applied cleanly."
        elif git apply --check -R "$PATCH" 2>/dev/null; then
          echo "Patch already applied. Skipping."
        elif git apply --3way --check "$PATCH" 2>/dev/null; then
          git apply --3way "$PATCH"
          echo "Patch applied with 3-way merge."
        else
          echo "Patch conflict. Attempting 3-way merge..."
          git apply --3way "$PATCH" || {
            echo "Patch FAILED. Creating reject files."
            git apply --reject "$PATCH" 2>/dev/null || true
            find . -name "*.rej" 2>/dev/null | head -20
            exit 1
          }
        fi

    - name: Copy modules to AzerothCore
      shell: pwsh
      run: |
        Get-ChildItem -Path "acoremods" -Directory | Where-Object { $_.Name -like 'mod-*' } | ForEach-Object {
          $mod = $_.Name
          $src = $_.FullName
          $dst = "azerothcore/modules/$mod"
          Copy-Item -Recurse -Force -Path $src -Destination $dst
          Write-Host "  Copied: $mod"
        }
        Write-Host "=== Modules in azerothcore/modules/ ==="
        Get-ChildItem -Path "azerothcore/modules/" -Directory | ForEach-Object { Write-Host "  - $($_.Name)" }

    - name: Configure CMake
      shell: pwsh
      working-directory: azerothcore
      run: |
        cmake -S . -B build `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=RelWithDebInfo `
          -DENABLE_PCH=1 `
          -DBUILD_TESTING=OFF `
          -DCMAKE_PREFIX_PATH="$env:DEPS_DIR"
        if ($LASTEXITCODE -ne 0) { throw "CMake configuration failed" }
        Write-Host "CMake configuration complete."

    - name: Build with MSBuild
      shell: pwsh
      working-directory: azerothcore
      run: |
        cmake --build build --config RelWithDebInfo -- /maxcpucount:$env:NUMBER_OF_PROCESSORS
        if ($LASTEXITCODE -ne 0) { throw "Build failed" }
        Write-Host "Build complete."

    - name: Package artifacts
      shell: pwsh
      run: |
        $buildDir = "azerothcore/build"
        $stagingDir = "$env:RUNNER_TEMP\staging"
        New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
        $acRoot = (Resolve-Path "azerothcore").Path
        $amRoot = (Resolve-Path "acoremods").Path

        # Binaries
        $binDir = "$buildDir/bin/RelWithDebInfo"
        if (Test-Path $binDir) {
          Get-ChildItem -Path $binDir -Include *.exe, *.dll | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination "$stagingDir\$($_.Name)" -Force
          }
        }

        # Core .conf.dist (preserve relative path)
        Get-ChildItem "azerothcore" -Filter "*.conf.dist" -Recurse | ForEach-Object {
          $rel = $_.FullName.Replace("$acRoot\", "")
          $dst = Join-Path $stagingDir $rel
          New-Item -ItemType Directory -Force -Path (Split-Path $dst -Parent) | Out-Null
          Copy-Item -Path $_.FullName -Destination $dst -Force
        }

        # acoremods .conf.dist (prefix with modules/)
        Get-ChildItem "acoremods" -Filter "*.conf.dist" -Recurse | ForEach-Object {
          $rel = $_.FullName.Replace("$amRoot\", "modules\")
          $dst = Join-Path $stagingDir $rel
          New-Item -ItemType Directory -Force -Path (Split-Path $dst -Parent) | Out-Null
          Copy-Item -Path $_.FullName -Destination $dst -Force
        }

        # lua_scripts/
        if (Test-Path "azerothcore/data/lua_scripts") {
          Copy-Item -Recurse -Force "azerothcore/data/lua_scripts" "$stagingDir/lua_scripts"
        }

        # README.txt (array join avoids YAML issues with PowerShell @-heredoc)
        $lines = New-Object System.Collections.ArrayList
        [void]$lines.Add('AzerothCore + acoremods Build')
        [void]$lines.Add('=============================')
        [void]$lines.Add("Build date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')")
        [void]$lines.Add("AC repo: $env:AC_REPO")
        [void]$lines.Add("AC branch: $env:AC_BRANCH")
        [void]$lines.Add('')
        [void]$lines.Add('Deployment:')
        [void]$lines.Add('1. Copy *.conf.dist to *.conf and edit database settings')
        [void]$lines.Add('2. Updates.AutoSetup=1 and Updates.EnableDatabases=1 (default)')
        [void]$lines.Add('3. Download data files (maps, vmaps, mmaps, cameras) from:')
        [void]$lines.Add('   https://www.azerothcore.org/wiki/database-archive')
        [void]$lines.Add('4. Start authserver.exe, then worldserver.exe')
        [void]$lines.Add('5. SQL migrations run automatically on first startup')
        $readme = $lines -join "`r`n"
        $readme | Out-File "$stagingDir\README.txt" -Encoding utf8

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: azerothcore-acoremods-windows-x64
        path: ${{ runner.temp }}\staging\**

    - name: Build summary
      if: success()
      shell: pwsh
      run: |
        $binDir = "azerothcore/build/bin/RelWithDebInfo"
        if (Test-Path $binDir) {
          Write-Host "=== Build Output ==="
          Get-ChildItem -Path $binDir -Include *.exe, *.dll | ForEach-Object {
            $size = "{0:N2} MB" -f ($_.Length / 1MB)
            Write-Host "  $($_.Name) - $size"
          }
        }
        Write-Host ""
        Write-Host "Build successful!"
        Write-Host "  AC repo: $env:AC_REPO @ $env:AC_BRANCH"
        Write-Host "  Artifact: azerothcore-acoremods-windows-x64"
